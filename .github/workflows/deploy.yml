name: Deploy Exam Display
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Rebuild Docker Container
        run: |
          cd /var/www/moodle/STA-Exams-Display
          # Using the modern 'docker compose' we just installed
          sudo docker compose up -d --build
