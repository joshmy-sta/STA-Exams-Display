name: Deploy Exam Display
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Rebuild Docker Container
        run: |
          # Use the path to the current checkout
          # We 'down' first to clear the name, then 'up' to start fresh
          sudo docker compose down
          sudo docker compose up -d --build
